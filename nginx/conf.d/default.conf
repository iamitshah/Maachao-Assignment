server_tokens off;

limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=10r/s;

server {
  listen 80;
  server_name testingproject.online www.testingproject.online;

  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl;
  http2 on;
  server_name testingproject.online www.testingproject.online;

  ssl_certificate     /etc/letsencrypt/live/testingproject.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/testingproject.online/privkey.pem;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Referrer-Policy "strict-origin" always;

  location = / { return 200 "OK\n"; add_header Content-Type text/plain; }

  location /health { proxy_pass http://api:8000/health; }

  location /api/ {
    limit_req zone=api_ratelimit burst=1 nodelay;
    limit_req_status 429;
    proxy_pass http://api:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
