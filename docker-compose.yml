services:
  api:
    image: devops-assessment-api:${API_TAG}
    container_name: api
    restart: always
    init: true
    env_file: .env
    networks: [backend]
    expose:
      - "8000"

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [backend]
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    env_file: .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks: [backend]
    expose:
      - "6379"


  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    depends_on: [api]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    networks: [backend]

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/webroot:/var/www/certbot

networks:
  backend:

volumes:
  pgdata:
